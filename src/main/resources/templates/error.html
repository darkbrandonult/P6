<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Erreur - PayMyBuddy</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary" aria-label="Navigation principale">
        <div class="container">
            <a class="navbar-brand" href="/dashboard">PayMyBuddy</a>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-body text-center">
                        <h1 class="display-1 text-danger">Erreur</h1>
                        <h2 th:text="${status != null ? status : '500'}">500</h2>
                        <h3 th:text="${error != null ? error : 'Erreur interne du serveur'}">Erreur interne du serveur</h3>
                        <p class="text-muted">
                            <span th:if="${message}" th:text="${message}"></span>
                            <span th:unless="${message}">Une erreur inattendue s'est produite.</span>
                        </p>
                        <div class="mt-4">
                            <a href="/dashboard" class="btn btn-primary">Retour au tableau de bord</a>
                            <a href="/" class="btn btn-outline-secondary">Retour à l'accueil</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
