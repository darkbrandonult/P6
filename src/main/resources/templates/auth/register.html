<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription - PayMyBuddy</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="bg-light">
    <div class="container">
        <div class="row justify-content-center mt-5">
            <div class="col-md-8 col-lg-6">
                <div class="card shadow">
                    <div class="card-body p-4">
                        <div class="text-center mb-4">
                            <h1 class="h3 text-primary">PayMyBuddy</h1>
                            <p class="text-muted">Créez votre compte gratuitement</p>
                        </div>

                        <!-- Messages d'erreur -->
                        <div th:if="${error}" class="alert alert-danger" role="alert" th:text="${error}"></div>

                        <!-- Formulaire d'inscription -->
                        <form th:action="@{/register}" th:object="${user}" method="post">
                            <div class="row">
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label for="firstName" class="form-label">Prénom *</label>
                                        <input type="text" 
                                               class="form-control"
                                               th:class="${#fields.hasErrors('firstName')} ? 'form-control is-invalid' : 'form-control'"
                                               id="firstName" 
                                               th:field="*{firstName}" 
                                               required
                                               aria-describedby="firstNameFeedback"
                                               placeholder="Votre prénom">
                                        <div id="firstNameFeedback" class="invalid-feedback" th:if="${#fields.hasErrors('firstName')}" th:errors="*{firstName}"></div>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label for="lastName" class="form-label">Nom *</label>
                                        <input type="text" 
                                               class="form-control"
                                               th:class="${#fields.hasErrors('lastName')} ? 'form-control is-invalid' : 'form-control'"
                                               id="lastName" 
                                               th:field="*{lastName}" 
                                               required
                                               aria-describedby="lastNameFeedback"
                                               placeholder="Votre nom">
                                        <div id="lastNameFeedback" class="invalid-feedback" th:if="${#fields.hasErrors('lastName')}" th:errors="*{lastName}"></div>
                                    </div>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label for="email" class="form-label">Adresse email *</label>
                                <input type="email" 
                                       class="form-control"
                                       th:class="${#fields.hasErrors('email')} ? 'form-control is-invalid' : 'form-control'"
                                       id="email" 
                                       th:field="*{email}" 
                                       required
                                       aria-describedby="emailHelp emailFeedback"
                                       placeholder="votre@email.com">
                                <div id="emailHelp" class="form-text">
                                    Cette adresse sera utilisée pour vous connecter et recevoir des notifications.
                                </div>
                                <div id="emailFeedback" class="invalid-feedback" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
                            </div>

                            <div class="mb-3">
                                <label for="password" class="form-label">Mot de passe *</label>
                                <input type="password" 
                                       class="form-control"
                                       th:class="${#fields.hasErrors('password')} ? 'form-control is-invalid' : 'form-control'"
                                       id="password" 
                                       th:field="*{password}" 
                                       required
                                       aria-describedby="passwordHelp passwordFeedback"
                                       placeholder="Choisissez un mot de passe sécurisé">
                                <div id="passwordHelp" class="form-text">
                                    Le mot de passe doit contenir au moins 6 caractères.
                                </div>
                                <div id="passwordFeedback" class="invalid-feedback" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
                            </div>

                            <div class="mb-3 form-check">
                                <input type="checkbox" class="form-check-input" id="terms" required>
                                <label class="form-check-label" for="terms">
                                    J'accepte les <a href="#" class="text-decoration-none">conditions d'utilisation</a> 
                                    et la <a href="#" class="text-decoration-none">politique de confidentialité</a> *
                                </label>
                            </div>

                            <div class="d-grid">
                                <button type="submit" class="btn btn-primary">
                                    Créer mon compte
                                </button>
                            </div>
                        </form>

                        <hr>

                        <div class="text-center">
                            <p class="mb-0">
                                Déjà un compte ? 
                                <a th:href="@{/login}" class="text-decoration-none">
                                    Connectez-vous
                                </a>
                            </p>
                        </div>
                    </div>
                </div>

                <div class="text-center mt-3">
                    <a th:href="@{/}" class="text-muted text-decoration-none">
                        ← Retour à l'accueil
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
