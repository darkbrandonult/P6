<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transactions - PayMyBuddy</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary" aria-label="Navigation principale">
        <div class="container">
            <a class="navbar-brand" href="/dashboard">PayMyBuddy</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="/dashboard">Tableau de bord</a>
                <a class="nav-link active" href="/transactions">Transactions</a>
                <a class="nav-link" href="/friends">Amis</a>
                <a class="nav-link" href="/profile">Profil</a>
                <form class="d-inline" th:action="@{/logout}" method="post">
                    <button type="submit" class="btn btn-link nav-link text-light border-0">Déconnexion</button>
                </form>
            </div>
        </div>
    </nav>

    <main class="container mt-4">
        <!-- Messages Flash -->
        <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
            <span th:text="${success}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <div class="row">
            <!-- Section Envoyer de l'argent -->
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header">
                        <h5>Envoyer de l'argent</h5>
                    </div>
                    <div class="card-body">
                        <form th:action="@{/send-money}" method="post">
                            <div class="mb-3">
                                <label for="receiverId" class="form-label">Destinataire</label>
                                <select class="form-select" id="receiverId" name="receiverId" required>
                                    <option value="">Choisir un ami...</option>
                                    <option th:each="friend : ${friends}" 
                                            th:value="${friend.id}" 
                                            th:text="${friend.firstName + ' ' + friend.lastName + ' (' + friend.email + ')'}">
                                    </option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label for="amount" class="form-label">Montant (€)</label>
                                <input type="number" class="form-control" id="amount" name="amount" 
                                       step="0.01" min="0.01" max="9999.99" required>
                            </div>
                            <div class="mb-3">
                                <label for="description" class="form-label">Description</label>
                                <input type="text" class="form-control" id="description" name="description" 
                                       placeholder="Ex: Remboursement restaurant" required>
                            </div>
                            <button type="submit" class="btn btn-primary">Envoyer</button>
                        </form>
                    </div>
                </div>
            </div>

            <!-- Informations utilisateur -->
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header">
                        <h5>Mon compte</h5>
                    </div>
                    <div class="card-body">
                        <p><strong>Solde actuel:</strong> <span class="text-success fw-bold" th:text="${user.balance + '€'}"></span></p>
                        <p><strong>Nom:</strong> <span th:text="${user.firstName + ' ' + user.lastName}"></span></p>
                        <p><strong>Email:</strong> <span th:text="${user.email}"></span></p>
                        
                        <form th:action="@{/add-money}" method="post" class="mt-3">
                            <div class="input-group">
                                <input type="number" class="form-control" name="amount" 
                                       step="0.01" min="0.01" max="9999.99" placeholder="Montant à ajouter" required>
                                <button class="btn btn-warning fw-semibold" type="submit">Ajouter</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>

        <!-- Historique des transactions -->
        <div class="row mt-4">
            <div class="col-12">
                <div class="card">
                    <div class="card-header">
                        <h5>Historique des transactions</h5>
                    </div>
                    <div class="card-body">
                        <div th:if="${#lists.isEmpty(transactions)}" class="text-center text-muted">
                            <p>Aucune transaction pour le moment.</p>
                        </div>
                        <div th:if="${!#lists.isEmpty(transactions)}">
                            <div class="table-responsive">
                                <table class="table table-striped">
                                    <thead>
                                        <tr>
                                            <th>Date</th>
                                            <th>Type</th>
                                            <th>Destinataire/Expéditeur</th>
                                            <th>Description</th>
                                            <th>Montant</th>
                                            <th>Statut</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        <tr th:each="transaction : ${transactions}">
                                            <td th:text="${#temporals.format(transaction.transactionDate, 'dd/MM/yyyy HH:mm')}"></td>
                                            <td>
                                                <span th:if="${transaction.sender.email == user.email}" class="badge bg-danger">Envoyé</span>
                                                <span th:if="${transaction.receiver.email == user.email}" class="badge bg-success">Reçu</span>
                                            </td>
                                            <td>
                                                <span th:if="${transaction.sender.email == user.email}" 
                                                      th:text="${transaction.receiver.firstName + ' ' + transaction.receiver.lastName}"></span>
                                                <span th:if="${transaction.receiver.email == user.email}" 
                                                      th:text="${transaction.sender.firstName + ' ' + transaction.sender.lastName}"></span>
                                            </td>
                                            <td th:text="${transaction.description}"></td>
                                            <td>
                                                <span th:if="${transaction.sender.email == user.email}" 
                                                      class="text-danger" th:text="'-' + ${transaction.amount} + '€'"></span>
                                                <span th:if="${transaction.receiver.email == user.email}" 
                                                      class="text-success" th:text="'+' + ${transaction.amount} + '€'"></span>
                                            </td>
                                            <td>
                                                <span th:if="${transaction.status.name() == 'COMPLETED'}" class="badge bg-success">Terminé</span>
                                                <span th:if="${transaction.status.name() == 'PENDING'}" class="badge bg-warning">En attente</span>
                                                <span th:if="${transaction.status.name() == 'FAILED'}" class="badge bg-danger">Échoué</span>
                                            </td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
